<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light HTML Editor — Dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; padding: 16px; height: 100vh; display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 16px; font-weight: 600; color: #1e293b; }
    #editor-container { flex: 1; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
    #output { font-size: 11px; color: #64748b; }
  </style>
</head>
<body>

<h1>Light HTML Editor — development preview</h1>
<div id="editor-container"></div>
<div id="output">No changes yet…</div>

<script type="module">
import { Editor } from '/src/index.ts'

const SAMPLE_HTML = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; }
    .hero { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); color: #fff; padding: 80px 40px; text-align: center; }
    .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; line-height: 1.1; }
    .hero p { font-size: 20px; opacity: 0.85; max-width: 560px; margin: 0 auto 32px; }
    .btn { display: inline-block; background: #fff; color: #1e40af; padding: 14px 32px; border-radius: 8px; font-weight: 700; font-size: 16px; text-decoration: none; }
    .features { display: flex; gap: 24px; padding: 60px 40px; justify-content: center; flex-wrap: wrap; }
    .card { background: #f8fafc; border-radius: 12px; padding: 28px; width: 220px; border: 1px solid #e2e8f0; }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
    .card p { font-size: 14px; color: #64748b; line-height: 1.6; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Build faster,<br>ship smarter</h1>
    <p>The all-in-one platform to create, publish and grow your online presence in minutes.</p>
    <a class="btn" href="#">Get started free</a>
  </section>
  <section class="features">
    <div class="card">
      <h3>⚡ Lightning fast</h3>
      <p>Pages load in under 1 second. Your visitors will never wait.</p>
    </div>
    <div class="card">
      <h3>🎨 Easy to customise</h3>
      <p>Point-and-click editing. No code required to look professional.</p>
    </div>
    <div class="card">
      <h3>📈 Built to grow</h3>
      <p>Analytics, A/B testing and integrations baked right in.</p>
    </div>
  </section>
</body>
</html>`

const editor = Editor.create('#editor-container', {
  html: SAMPLE_HTML,
  changeDebounce: 600,
  onChange: (html) => {
    document.getElementById('output').textContent =
      `onChange fired — ${html.length} chars`
  },
})

editor.on('select', (el) => {
  console.log('selected:', el.tagName, el.className)
})

editor.on('ready', () => {
  console.log('Editor ready')
})
</script>
</body>
</html>
